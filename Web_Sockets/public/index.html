<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkboxes.io</title>
    <style>
        /* --- Reset & Core Dark Mode Styles --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(rgb(0, 0, 99), rgb(0, 0, 0));
            color: #e1e1e6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 3rem 1rem;
        }

        /* --- Header & Branding --- */
        .header-area {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            color: #ffffff;
            letter-spacing: -0.05em;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .subtitle {
            font-size: 1rem;
            color: #94a3b8;
            /* Soft blue-gray for readability */
            font-weight: 400;
            letter-spacing: 0.01em;
            max-width: 450px;
            line-height: 1.4;
        }

        /* --- Grid Container --- */
        #container {
            display: grid;
            /* Creates a responsive grid of squares */
            grid-template-columns: repeat(auto-fill, minmax(24px, 1fr));
            gap: 8px;
            width: 100%;
            max-width: 600px;
            background: #110d0d00;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(255, 255, 255, 0.234),
                0 0 0 1px rgba(255, 255, 255, 0.05);
        }

        /* --- Custom Checkbox Styling --- */
        #container input[type="checkbox"] {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            background-color: #2a2a30;
            border: 2px solid #3e3e4a;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Hover State */
        #container input[type="checkbox"]:hover {
            border-color: #6366f1;
            background-color: #313139;
            transform: scale(1.05);
        }

        /* Checked State */
        #container input[type="checkbox"]:checked {
            background-color: #1f23f7;
            border-color: #383bfe;
            box-shadow: 0 0 12px rgba(99, 102, 241, 0.4);
        }

        /* Checkmark Icon inside the checkbox */
        #container input[type="checkbox"]:checked::before {
            content: "";
            width: 6px;
            height: 11px;
            border: solid white;
            border-width: 0 2.5px 2.5px 0;
            transform: rotate(45deg);
            margin-bottom: 2px;
        }

        /* Focus state for accessibility */
        #container input[type="checkbox"]:focus-visible {
            outline: 2px solid #a5b4fc;
            outline-offset: 2px;
        }
    </style>
</head>

<body>
    <div class="header-area">
        <h1>Checkboxes.io</h1>
        <p class="subtitle">A real-time, rate-limited experiment in massive concurrency.</p>
    </div>

    <div id="container"></div>
    <script src="/socket.io/socket.io.js"></script>

    <script>

        const socket = io();

        socket.on("connect", () => {
            console.log("Socket Connected A:", socket.id);

            socket.on('server:Checkbox:change', (data) => {
                console.log('Received checkbox change:', data);
                const { index, checked } = data;
                const box = document.getElementById(`checkbox-${index}`)
                if (box) {
                    box.checked = checked;
                }
            });
        });

        const container = document.getElementById('container')
        const Checkboxes_len = 100;

        window.addEventListener('load', async () => {
            const response = await fetch('/checkboxes', { method: 'GET' });
            const data = await response.json()
            if (data && data.checkboxes) {

                data.checkboxes.forEach((checked, index) => {

                    const input = document.createElement('input')
                    input.type = "checkbox";
                    input.id = `checkbox-${index}`;
                    container.appendChild(input)
                    input.checked = checked

                    input.addEventListener('change', (e) => {
                        const checked = e.target.checked
                        // console.log('Checked = ', { index,checked });
                        socket.emit('Client:Checkbox:Change', { index, checked })
                    })
                })
            }
        })




    </script>
</body>

</html>
