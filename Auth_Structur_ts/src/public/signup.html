<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>authlayers - Create Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #0b1319;
            --bg-card: #111c24;
            --text-heading: #5cdbb5;
            --text-main: #9cb1c2;
            --text-white: #ffffff;
            --border: #1a2a36;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; padding: 0 24px; }
        
        /* Navbar */
        nav { max-width: 1100px; width: 100%; margin: 0 auto; display: flex; align-items: center; padding: 24px 0; }
        .logo { display: flex; align-items: center; gap: 8px; color: var(--text-heading); font-size: 1.4rem; font-weight: 700; text-decoration: none; }

        /* Container centering the card */
        .wrapper { flex: 1; display: flex; justify-content: center; align-items: center; padding: 40px 0; }
        
        .auth-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 40px; width: 100%; max-width: 420px; }
        .auth-header { margin-bottom: 24px; text-align: center; }
        .auth-header h2 { color: var(--text-white); font-size: 1.6rem; margin-bottom: 8px; }
        .auth-header p { font-size: 0.9rem; color: var(--text-main); }
        
        /* Forms */
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: var(--text-main); font-weight: 500; }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-main); }
        .input-wrapper input { width: 100%; padding: 12px 16px 12px 42px; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 8px; color: var(--text-white); font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
        .input-wrapper input:focus { border-color: var(--text-heading); }
        
        .submit-btn { width: 100%; padding: 14px; background: var(--text-heading); border: none; border-radius: 8px; color: var(--bg-dark); font-weight: 600; font-size: 1rem; cursor: pointer; margin-top: 10px; transition: opacity 0.2s; }
        .submit-btn:hover { opacity: 0.9; }
        
        .switch-form { text-align: center; margin-top: 24px; font-size: 0.9rem; }
        .switch-form a { color: var(--text-heading); text-decoration: none; font-weight: 500; }
        .switch-form a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo"><i class="fa-solid fa-arrow-left" style="color: rgb(99, 230, 190);"></i></i> Back</a>
    </nav>

    <div class="wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Create Account</h2>
                <p>Register via layered DTO structure</p>
            </div>
            
            <form action="/api/v1/auth/signup" method="POST">
                <div class="form-group">
                    <label>Full Name</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" name="name" placeholder="John Doe" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" name="email" placeholder="you@example.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" name="password" placeholder="••••••••" required>
                    </div>
                </div>
                <button type="submit" class="submit-btn">Get Started</button>
            </form>

            <div class="switch-form">
                Already registered? <a href="login.html">Log in here</a>
            </div>
        </div>
    </div>

</body>
</html>
